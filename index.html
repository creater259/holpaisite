<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HolpAI</title>
    <style>
        body { margin: 0; background: #0b0b0b; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; line-height: 1.5; }
        .user { background: #3a3a3a; align-self: flex-end; color: #fff; }
        .bot { background: #007bff; align-self: flex-start; color: #fff; }
        .input-area { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; outline: none; }
        button { background: #007bff; border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="msg bot">Привіт! Твій HolpAI готовий до роботи. Напиши мені!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напишіть повідомлення..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">Надіслати</button>
    </div>

    <script>
        const API_KEY = "AIzaSyCMckxA8SZqQQR6NN0eOOhcCsfjimwGVdg";
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            btn.disabled = true;

            const loading = document.createElement('div');
            loading.className = 'msg bot';
            loading.innerText = 'Думаю...';
            chat.appendChild(loading);

            try {
                // Використовуємо новішу та швидшу модель 1.5-flash
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                loading.remove();

                if (data.candidates && data.candidates[0].content) {
                    addMessage(data.candidates[0].content.parts[0].text, 'bot');
                } else if (data.error) {
                    addMessage("Помилка від Google: " + data.error.message, 'bot');
                } else {
                    addMessage("Щось пішло не так. Перевір ліміти API.", 'bot');
                }
            } catch (e) {
                loading.remove();
                addMessage("Помилка мережі. Перевір консоль (F12).", 'bot');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
