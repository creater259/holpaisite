<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HolpAI</title>
    <style>
        body { margin: 0; background: #0b0b0b; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .user { background: #333; align-self: flex-end; }
        .bot { background: #007bff; align-self: flex-start; }
        .input-area { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; outline: none; }
        button { background: #007bff; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="msg bot">Привіт! Я твій HolpAI. Напиши мені щось!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Напишіть повідомлення..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">Надіслати</button>
    </div>

    <script>
        const API_KEY = "AIzaSyCe_t2kPNuMt2qLdbTVdlZkBu3gOKP9G5Q"; // Твій ключ
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            btn.disabled = true;

            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'msg bot';
            loadingMsg.innerText = 'Зачекайте...';
            chat.appendChild(loadingMsg);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                loadingMsg.remove();

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    addMessage(data.candidates[0].content.parts[0].text, 'bot');
                } else {
                    addMessage("Помилка: Не вдалося отримати відповідь.", 'bot');
                }
            } catch (e) {
                loadingMsg.remove();
                addMessage("Помилка зв'язку з AI.", 'bot');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
